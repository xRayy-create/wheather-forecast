<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather Forecast</title>
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <div class="header">
      <h2>Good Morning</h2>
      <div class="header__controls">
        <div class="header__search">
          <img src="./icons/search.svg" alt="" class="header__search-icon">
          <input type="search" placeholder="Search your location" class="header__search-input">
        </div>
        <label class="header__toggle">
          <input type="checkbox" class="header__toggle-input">
          <span class="header__toggle-slider">
            <img src="./icons/sun.svg" class="header__toggle-icon header__toggle-icon-sun">
            <img src="./icons/moon.svg" class="header__toggle-icon header__toggle-icon-moon">
          </span>
        </label>
      </div>
    </div>
    <main class="dashboard">
      <div class="dashboard__left-column">
        <section class="current_wheather dashboard__current">
        <div class="current_wrapper current_wheather">
          <div class="current_wrapper__general-info">
            <div class="location-field current_wheather__first-info">
              <img src="./icons/location.svg" class="location-field__icon">
              <span class="location-field__text">Dhaka, Banglandesh</span>
            </div>
            <div class="temperature_toggle">
              <img src="icons/celsius.svg" class="temperature_toggle__celsius">
              <img src="icons/arrow.svg" class="temperature_toggle__arrow">
              <select class="temperature_toggle__select">
                <option value="celsius">°C</option>
                <option value="fahrenheit">°F</option>
              </select>
            </div>
          </div>
          <div class="current_wrapper__day-info">
            <p class="day" style="font-weight: 500; font-size: 36px;">Sunday</p>
            <p class="date" style="font-weight: 400; font-size: 16px;" >04 Aug, 2024</p>
          </div>
          <div class="current_wrapper__temp-info">
            <img src="icons/rain.svg" class="current_weather__icon" style="width: 150px; height: 150px;">
            <div class="current_wrapper__second-info">
              <p class="temp-main" style="font-size: 40px; font-weight: 500;">28°C</p>
              <p class="temp-desc" style="font-size: 20px; font-weight: 500; margin-top: 45px;">Heavy Rain</p>
              <p class="temp-feels" style="font-size: 16px; font-weight: 400; margin-top: 5px;">Feels like 31°</p>
            </div>
          </div>
        </div>
        </section>
        <section class="other_countries-wheather dashboard__countries">
          <h2>Others Countries</h2>
        </section>
      </div>
      <div class="dashboard__right-column">
        <section class="wheather-highlights dashboard__highlights">
          <h2>Today's Highlight</h2>
          <div class="wheather-info wheather-highlights">
            <div class="wheather-info__wind">
              <div class="card-wind wheather-info__wind">
                <div class="card-wind__general">
                  <img src="icons/wind.svg">
                  Wind Status
                </div>
                <div class="card-wind__speed-value">
                  7.90
                  <span class="card-wind__speed">km/h</span>
                </div>
                <div class="card-wind__time">9:00 AM</div>
              </div>
            </div>
            <div class="wheather-info__uv-index">
              <div class="card_uv-index wheather-info__uv-index">
                <div class="card_uv-index__general">
                  <img src="icons/uv-index.svg">
                  UV Index
                </div>
                <div class="card_uv-index__number">
                  4
                  <span class="card_uv-index__value">UV</span>
                </div>
                <div class="card_uv-index__moderate">Moderate UV</div>
              </div>
            </div>
            <div class="wheather-info__humidity">
              <div class="card-humidity wheather-info__humidity">
                <div class="card-humidity__general">
                  <img src="icons/humidity.svg">
                  Humidity
                </div>
                <div class="card-humidity__number">
                  85
                  <span class="card-humidity__value">%</span>
                </div>
                <div class="card-humidity__result">Moderate UV</div>
              </div>
            </div>
            <div class="wheather-info__visibility">
              <div class="card-visibility wheather-info__visibility">
                <div class="card-visibility__general">
                  <img src="icons/visibility.svg">
                  Visibility
                </div>
                <div class="card-visibility__number">
                  5
                  <span class="card-visibility__value">km</span>
                </div>
                <div class="card-visibility__time">9:00 AM</div>
              </div>
            </div>
            <div class="card-sunrise_big wheather-info__sunrise">
              <div class="sunrise_info card-sunrise_big">
                <img src="icons/sunrise.svg">
                <div class="sunrise_general sunrise_info">
                  <p class="sunrise_general__title">Sunrise</p>
                  <p class="sunrise_general__time">4:50 AM</p>
                </div>
              </div>
            </div>
            <div class="wheather-info__sunset card-sunset_big">
              <div class="sunset_info card-sunset_big">
                <img src="icons/sunset.svg">
                <div class="sunset_general sunrise_info">
                  <p class="sunset_general__title">Sunset</p>
                  <p class="sunset_general__time">4:50 AM</p>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="wheather-forecast dashboard__forecast">
          <h2>10 Day Forecast</h2>
          <div class="wheather-forecast__wrapper">
            <div class="forecast-column wheather-forecast">
              <div class="columns forecast-column">
              <p>Today</p>
              <img src="icons/rain.svg">
              <p>28°C</p>
              </div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
              <div class="columns forecast-column"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
